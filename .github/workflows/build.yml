name: Build Chameleon Tweak

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          sudo mkdir -p /opt/theos
          sudo chown $(whoami) /opt/theos
          git clone --recursive https://github.com/theos/theos.git /opt/theos
          echo "THEOS=/opt/theos" >> $GITHUB_ENV

      - name: Download iOS SDK
        run: |
          curl -L https://github.com/theos/sdks/raw/master/iPhoneOS16.0.sdk.tar.xz -o /tmp/sdk.tar.xz
          tar -xJf /tmp/sdk.tar.xz -C /opt/theos/sdks

      - name: Build package
        run: |
          cd $GITHUB_WORKSPACE
          make package FINALPACKAGE=1

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: Chameleon
          path: packages/*.deb
