name: Build Chameleon Tweak

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          sudo mkdir -p /opt/theos
          sudo chown $(whoami) /opt/theos
          git clone --recursive https://github.com/theos/theos.git /opt/theos
          echo "THEOS=/opt/theos" >> $GITHUB_ENV

      - name: Setup iOS SDK
        run: |
          mkdir -p /opt/theos/sdks
          # Use Xcode's bundled SDK (always available on macOS runners)
          XCODE_SDK=$(xcrun --sdk iphoneos --show-sdk-path 2>/dev/null || true)
          if [ -n "$XCODE_SDK" ]; then
            echo "Using Xcode SDK at: $XCODE_SDK"
            ln -sf "$XCODE_SDK" /opt/theos/sdks/iPhoneOS16.0.sdk
          else
            # Fallback: download from theos/sdks releases
            curl -L -o /tmp/sdk.tar.xz \
              "https://github.com/theos/sdks/releases/download/iPhoneOS16.0.sdk/iPhoneOS16.0.sdk.tar.xz"
            tar -xJf /tmp/sdk.tar.xz -C /opt/theos/sdks
          fi

      - name: Build package
        run: |
          cd $GITHUB_WORKSPACE
          make package FINALPACKAGE=1

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: Chameleon
          path: packages/*.deb
